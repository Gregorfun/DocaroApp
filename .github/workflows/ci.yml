name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr tesseract-ocr-deu poppler-utils

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-benchmark

    - name: Run tests
      run: |
        python -m pytest tests

    - name: Validate config (non-strict)
      run: |
        python tools/validate_config.py

  benchmark:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-benchmark

    - name: Run benchmark tests
      run: |
        python -m pytest tests/performance/test_benchmark_extractor.py --benchmark-only --benchmark-json=benchmark.json

    - name: Enforce benchmark threshold
      run: |
        python tools/check_benchmark_threshold.py benchmark.json 0.00005

    - name: Upload benchmark artifact
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark.json

  lint:
    runs-on: ubuntu-latest

    env:
      QUALITY_CHECK_PATHS: >-
        app
        config.py
        services
        tests
        tools

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black pre-commit

    - name: Lint with Ruff
      run: |
        ruff check $QUALITY_CHECK_PATHS

    - name: Check formatting with Black
      run: |
        black --check $QUALITY_CHECK_PATHS
