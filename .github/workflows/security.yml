name: Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit for all requirement sets
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          requirement_files = sorted(
              path for path in Path('.').glob('requirements*.txt') if path.is_file()
          )
          if not requirement_files:
              raise SystemExit('No requirements files found')

          for path in requirement_files:
              print(f'Auditing {path} ...')
              subprocess.run([sys.executable, '-m', 'pip_audit', '-r', str(path)], check=True)
          PY
