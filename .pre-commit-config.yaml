repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(app/runtime_storage\.py|core/(metrics|observability|runtime_store)\.py|services/worker\.py|tests/(performance|test_runtime_store|test_benchmark_threshold).*\.py|loadtests/.*\.py|tools/(export_ground_truth_snapshot|drift_report|report_performance_percentiles|check_benchmark_threshold|migrate_runtime_store)\.py)$

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: [--line-length=120]
        files: ^(app/runtime_storage\.py|core/(metrics|observability|runtime_store)\.py|services/worker\.py|tests/(performance|test_runtime_store|test_benchmark_threshold).*\.py|loadtests/.*\.py|tools/(export_ground_truth_snapshot|drift_report|report_performance_percentiles|check_benchmark_threshold|migrate_runtime_store)\.py)$
