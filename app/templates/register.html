<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DocaroApp Registrierung</title>
    <script>
      (function() {
        const isDarkMode = localStorage.getItem('docaro-dark-mode');
        if (isDarkMode === 'true' || (isDarkMode === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark-mode');
        }
      })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <script src="{{ url_for('static', filename='theme-toggle.js') }}"></script>
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Registrierung</h1>
        <p class="muted">Eigenes Konto für unabhängige Nutzung erstellen.</p>
      </header>

      <section class="panel">
        {% if error %}
          <p class="notice" style="border-color:#b91c1c;color:#b91c1c;">{{ error }}</p>
        {% endif %}
        <form action="{{ url_for('register_submit') }}" method="post" class="settings-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
          <div class="form-row">
            <label>E-Mail</label>
            <input type="email" name="email" required autocomplete="username" value="{{ email or '' }}" />
          </div>
          <div class="form-row">
            <label>Passwort</label>
            <input type="password" name="password" required autocomplete="new-password" minlength="8" />
          </div>
          <div class="form-row">
            <label>Passwort wiederholen</label>
            <input type="password" name="password_confirm" required autocomplete="new-password" minlength="8" />
          </div>
          <div class="form-actions">
            <button type="submit">Konto erstellen</button>
          </div>
        </form>
        <p class="muted" style="margin-top:0.75rem;">
          Bereits registriert?
          <a href="{{ url_for('login_page') }}">Zum Login</a>
        </p>
      </section>
    </main>
  </body>
</html>
