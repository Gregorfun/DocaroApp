# ================================================================
# Docker Compose für Docaro Services
# Startet: Qdrant, Label Studio, MLflow, Prometheus, Grafana, Redis Exporter
# ================================================================

version: '3.8'

services:
  # ──────────────────────────────────────────────────────────────
  # QDRANT: Vektordatenbank für semantische Suche
  # ──────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: docaro_qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - docaro_network

  # ──────────────────────────────────────────────────────────────
  # LABEL STUDIO: Annotations & Trainingsdaten-Management
  # ──────────────────────────────────────────────────────────────
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: docaro_label_studio
    ports:
      - "8080:8080"
    volumes:
      - ./label_studio_data:/label-studio/data
      - ./label_studio_media:/label-studio/media
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/media
    restart: unless-stopped
    networks:
      - docaro_network

  # ──────────────────────────────────────────────────────────────
  # MLFLOW: Experiment-Tracking & Model Registry
  # ──────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: docaro_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    restart: unless-stopped
    networks:
      - docaro_network

  # ──────────────────────────────────────────────────────────────
  # PROMETHEUS: Metriken + Alerting Rules
  # ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: docaro_prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - docaro_network

  # ──────────────────────────────────────────────────────────────
  # GRAFANA: Dashboards & Visualisierung
  # ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:latest
    container_name: docaro_grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${DOCARO_GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${DOCARO_GRAFANA_ADMIN_PASSWORD:?Set DOCARO_GRAFANA_ADMIN_PASSWORD in .env or shell}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${DOCARO_GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - ./grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - docaro_network

  # ──────────────────────────────────────────────────────────────
  # REDIS EXPORTER: Redis- und Queue-nahe Metriken
  # ──────────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: docaro_redis_exporter
    ports:
      - "127.0.0.1:9121:9121"
    environment:
      - REDIS_ADDR=redis://host.docker.internal:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - docaro_network

  # ──────────────────────────────────────────────────────────────
  # OPTIONAL: DOCLING-SERVE (API-Service für Docling)
  # ──────────────────────────────────────────────────────────────
  # Hinweis: Docling-Serve ist noch in Entwicklung
  # Sobald verfügbar, kann es hier eingebunden werden
  #
  # docling-serve:
  #   image: docling/docling-serve:latest
  #   container_name: docaro_docling_serve
  #   ports:
  #     - "8000:8000"
  #   restart: unless-stopped
  #   networks:
  #     - docaro_network

networks:
  docaro_network:
    driver: bridge

# ================================================================
# VERWENDUNG
# ================================================================
#
# Alle Services starten:
#   docker-compose -f docker/docker-compose.yml up -d
#
# Services stoppen:
#   docker-compose -f docker/docker-compose.yml down
#
# Logs anzeigen:
#   docker-compose -f docker/docker-compose.yml logs -f
#
# Einzelnen Service starten:
#   docker-compose -f docker/docker-compose.yml up -d qdrant
#
# ================================================================
# ZUGRIFF
# ================================================================
#
# Qdrant REST API:     http://localhost:6333
# Qdrant Web UI:       http://localhost:6333/dashboard
#
# Label Studio:        http://localhost:8080
#   Default Login:     Beim ersten Start erstellen
#
# MLflow UI:           http://localhost:5000
# Prometheus UI:       http://localhost:9090
# Grafana UI:          http://localhost:3000
#   Admin-Passwort:    via DOCARO_GRAFANA_ADMIN_PASSWORD setzen
#
# ================================================================
# PERSISTENTE DATEN
# ================================================================
#
# Alle Daten werden in folgenden Ordnern gespeichert:
#   - qdrant_storage/        : Qdrant Vektoren
#   - label_studio_data/     : Label Studio Projekte & Tasks
#   - label_studio_media/    : Hochgeladene Dateien
#   - mlflow_data/           : MLflow Experimente & Modelle
#   - prometheus_data/       : Prometheus TSDB
#   - grafana_data/          : Grafana Datenbank / Dashboards
#
# Diese Ordner bleiben erhalten, auch wenn Container gestoppt werden.
#
# ================================================================
