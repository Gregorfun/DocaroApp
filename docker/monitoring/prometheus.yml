global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: docaro-worker
    static_configs:
      - targets: ["host.docker.internal:9108"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
